<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Options Wheel Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">
<div class="w-full max-w-sm">
  <div class="text-center mb-8">
    <div class="flex justify-center mb-3">
      <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
        </svg>
      </div>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">Options Wheel Tracker</h1>
    <p class="text-sm text-gray-500 mt-1">Your personal trading journal</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="mb-4 space-y-2">
    {% for category, msg in messages %}
    <div class="p-3 rounded-lg text-sm
                {% if category == 'error' %}bg-red-50 text-red-800 border border-red-200{% endif %}">
      {{ msg }}
    </div>
    {% endfor %}
  </div>
  {% endif %}
  {% endwith %}

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
    <form method="POST" action="{{ url_for('auth.login') }}">
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" autofocus
             class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
             placeholder="Enter your password" required />
      <button type="submit"
              class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition-colors">
        Sign In
      </button>
    </form>
  </div>
</div>
</body>
</html>
