{% extends "base.html" %}
{% block title %}{{ 'Edit' if action == 'edit' else 'New' }} Position — Options Wheel Tracker{% endblock %}

{% block content %}
<div class="max-w-xl">
  <div class="flex items-center gap-3 mb-6">
    <a href="{{ url_for('trades.positions') }}" class="text-gray-400 hover:text-gray-600">&#8592; Positions</a>
    <h1 class="text-2xl font-bold text-gray-900">{{ 'Edit Position' if action == 'edit' else 'New Position' }}</h1>
  </div>

  <div class="bg-white rounded-2xl border border-gray-200 p-6">
    <form method="POST"
          action="{{ url_for('trades.edit_position', pos_id=pos_id) if action == 'edit' else url_for('trades.new_position') }}"
          class="space-y-5">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Symbol *</label>
          <input type="text" name="symbol" value="{{ position.symbol or '' }}" required
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm uppercase focus:ring-2 focus:ring-blue-500 focus:outline-none"
                 placeholder="AAPL" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Shares *</label>
          <input type="number" name="shares" value="{{ position.shares or '' }}" min="1" step="1" required
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                 placeholder="100" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Purchase Price (avg cost) *</label>
          <input type="number" name="purchase_price" value="{{ position.purchase_price or '' }}" step="0.01" min="0" required
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                 placeholder="150.00" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Open Date *</label>
          <input type="date" name="open_date" value="{{ position.open_date or today }}" required
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Close Date</label>
          <input type="date" name="close_date" value="{{ position.close_date or '' }}"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
          <select name="status"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <option value="open" {{ 'selected' if position.status == 'open' or not position.status }}>Open</option>
            <option value="closed" {{ 'selected' if position.status == 'closed' }}>Closed</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
        <textarea name="notes" rows="2"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none"
                  placeholder="Optional notes...">{{ position.notes or '' }}</textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <a href="{{ url_for('trades.positions') }}"
           class="flex-1 text-center px-4 py-2 border border-gray-200 text-gray-700 rounded-lg text-sm hover:bg-gray-50">Cancel</a>
        <button type="submit"
                class="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">
          {{ 'Update' if action == 'edit' else 'Add Position' }}
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
