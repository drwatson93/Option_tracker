{% extends "base.html" %}
{% block title %}{{ 'Edit' if action == 'edit' else 'New' }} Trade — Options Wheel Tracker{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <div class="flex items-center gap-3 mb-6">
    <a href="{{ url_for('trades.index') }}" class="text-gray-400 hover:text-gray-600">
      &#8592; Trades
    </a>
    <h1 class="text-2xl font-bold text-gray-900">{{ 'Edit Trade' if action == 'edit' else 'New Trade' }}</h1>
  </div>

  <div class="bg-white rounded-2xl border border-gray-200 p-6">
    <form method="POST"
          action="{{ url_for('trades.edit_trade', trade_id=trade_id) if action == 'edit' else url_for('trades.new_trade') }}"
          class="space-y-5">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Symbol *</label>
          <input type="text" name="symbol" value="{{ trade.symbol or '' }}" required
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm uppercase focus:ring-2 focus:ring-blue-500 focus:outline-none"
                 placeholder="AAPL" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Option Type *</label>
          <select name="option_type" required
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
            {% for ot in ['CC', 'CSP', 'Call', 'Put', 'Stock'] %}
            <option value="{{ ot }}" {{ 'selected' if trade.option_type == ot }}>{{ ot }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Strike Price</label>
          <input type="number" name="strike" value="{{ trade.strike or '' }}" step="0.5" min="0"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                 placeholder="200.00" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Expiration Date</label>
          <input type="date" name="expiration_date" value="{{ trade.expiration_date or '' }}"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Quantity (contracts)</label>
          <input type="number" name="quantity" value="{{ trade.quantity or 1 }}" min="1" step="1"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Fees ($)</label>
          <input type="number" name="fees" value="{{ trade.fees or 0 }}" step="0.01" min="0"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                 placeholder="0.00" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Open Premium (per share)</label>
          <input type="number" name="open_premium" value="{{ trade.open_premium or '' }}" step="0.01" min="0"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                 placeholder="2.35" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Close Premium (per share)</label>
          <input type="number" name="close_premium" value="{{ trade.close_premium or '' }}" step="0.01" min="0"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                 placeholder="Leave blank if still open" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Open Date *</label>
          <input type="date" name="open_date" value="{{ trade.open_date or today }}" required
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Close Date</label>
          <input type="date" name="close_date" value="{{ trade.close_date or '' }}"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select name="status"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
          {% for s in ['open', 'closed', 'expired', 'assigned'] %}
          <option value="{{ s }}" {{ 'selected' if trade.status == s }}>{{ s.capitalize() }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
        <textarea name="notes" rows="2"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none"
                  placeholder="Optional notes...">{{ trade.notes or '' }}</textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <a href="{{ url_for('trades.index') }}"
           class="flex-1 text-center px-4 py-2 border border-gray-200 text-gray-700 rounded-lg text-sm hover:bg-gray-50">
          Cancel
        </a>
        <button type="submit"
                class="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">
          {{ 'Update Trade' if action == 'edit' else 'Add Trade' }}
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
